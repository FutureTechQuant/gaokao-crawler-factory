name: Create Gaokao Crawler Repo

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "名字的英文 slug，例如 xinxin"
        required: true
        type: string
      visibility:
        description: "仓库可见性"
        required: true
        default: public
        type: choice
        options:
          - public
          - private

jobs:
  create-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FutureTechQuant

      - name: Prepare names
        id: prep
        shell: bash
        run: |
          RAW_SLUG="${{ github.event.inputs.slug }}"
          SLUG="$(echo "$RAW_SLUG" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g' | sed 's/[^a-z0-9-]//g' | sed 's/--*/-/g' | sed 's/^-//; s/-$//')"

          if [ -z "$SLUG" ]; then
            echo "slug 为空，退出"
            exit 1
          fi

          REPO="gaokao-${SLUG}-crawler"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Check repository exists
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -e
          if gh api "repos/FutureTechQuant/${{ steps.prep.outputs.repo }}" >/dev/null 2>&1; then
            echo "仓库已存在：FutureTechQuant/${{ steps.prep.outputs.repo }}"
            exit 1
          fi

      - name: Create repository in organization
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -e

          if [ "${{ github.event.inputs.visibility }}" = "private" ]; then
            PRIVATE=true
          else
            PRIVATE=false
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/orgs/FutureTechQuant/repos" \
            -f name="${{ steps.prep.outputs.repo }}" \
            -f description="Generated crawler repo for ${{ steps.prep.outputs.slug }}" \
            -F private=$PRIVATE \
            -F auto_init=true

      - name: Checkout source repo restore branch
        uses: actions/checkout@v4
        with:
          repository: FutureTechQuant/gaokao-crawler
          ref: main
          path: source-repo
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: FutureTechQuant/${{ steps.prep.outputs.repo }}
          path: target-repo
          token: ${{ steps.app-token.outputs.token }}

      - name: Create files
        shell: bash
        run: |
          set -e

          mkdir -p target-repo/data
          mkdir -p target-repo/crawlers
          mkdir -p target-repo/.github/workflows

          cp source-repo/data/schools.json target-repo/data/schools.json
		  cp source-repo/crawlers/base.py target-repo/crawlers/base.py
          cp source-repo/requirements.txt target-repo/requirements.txt

          touch "target-repo/crawlers/${{ steps.prep.outputs.slug }}.py"
          touch "target-repo/.github/workflows/${{ steps.prep.outputs.slug }}.yml"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -e
          cd target-repo

          USER_ID="$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)"
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${USER_ID}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
            exit 0
          fi

          git commit -m "Initialize ${{ steps.prep.outputs.repo }}"
          git push

      - name: Show result
        shell: bash
        run: |
          echo "Created: https://github.com/FutureTechQuant/${{ steps.prep.outputs.repo }}"
